:root {
  --bg: #080808;
  --surface: #101010;
  --border: #1e1e1e;
  --text: #b0b0b0;
  --text-dim: #444;
  --text-bright: #e8e8e8;
  --yt: #ff3b3b;
  --reddit: #ff5722;
}

html, body {
  height: 100%;
  overscroll-behavior: none;
}

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  max-width: 480px;
  margin: 0 auto;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── Header ── */
header {
  flex-shrink: 0;
  padding: 14px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: -1px;
}

.logo span { color: var(--text-dim); }

.header-actions { display: flex; gap: 2px; }

.icon-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  padding: 6px 8px;
  font-size: 15px;
  line-height: 1;
  transition: color 0.15s;
  font-family: inherit;
}
.icon-btn:active { color: var(--text-bright); }

/* ── Tabs ── */
.tabs {
  flex-shrink: 0;
  display: flex;
  border-bottom: 1px solid var(--border);
}

.tab {
  flex: 1;
  padding: 9px 0;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text-dim);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.15s, border-color 0.15s;
}

.tab.yt-active  { color: var(--yt);     border-bottom-color: var(--yt);     }
.tab.red-active { color: var(--reddit); border-bottom-color: var(--reddit); }

/* ── Feed ── */
#feed {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.status {
  padding: 48px 16px;
  text-align: center;
  color: var(--text-dim);
  font-size: 11px;
  letter-spacing: 1px;
}

.err { color: #cc4444; font-size: 11px; padding: 16px; }

/* ── Feed item ── */
.item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  text-decoration: none;
  color: inherit;
  cursor: pointer;
  transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.item:active { background: var(--surface); }

.thumb {
  width: 76px;
  height: 50px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--surface);
  display: block;
}

.thumb-ph {
  width: 76px;
  height: 50px;
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--text-dim);
}

.item-body { flex: 1; min-width: 0; padding-top: 1px; }

.item-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-bright);
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 5px;
}

.item-meta {
  font-size: 10px;
  color: var(--text-dim);
  display: flex;
  flex-wrap: wrap;
  gap: 0 10px;
  line-height: 1.3;
}

.meta-src-yt  { color: #cc3333; }
.meta-src-red { color: #d4430f; }

/* ── Settings drawer ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 30;
  backdrop-filter: blur(2px);
}
.overlay.open { display: block; }

.drawer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  max-width: 480px;
  margin: 0 auto;
  background: #0e0e0e;
  border-top: 1px solid #2a2a2a;
  z-index: 31;
  padding: 20px 16px 32px;
  max-height: 82dvh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.22s cubic-bezier(.4,0,.2,1);
}
.drawer.open { transform: translateY(0); }

.drawer-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 20px;
}

.section { margin-bottom: 22px; }

.section-label {
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 10px;
}

.tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }

.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 4px 6px 4px 9px;
  background: #161616;
  border: 1px solid #2a2a2a;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 5px;
}

.tag-x {
  background: none;
  border: none;
  color: #555;
  cursor: pointer;
  font-size: 13px;
  padding: 0 2px;
  font-family: monospace;
  line-height: 1;
}
.tag-x:active { color: #aaa; }

.add-row { display: flex; gap: 6px; }

.field {
  flex: 1;
  background: #161616;
  border: 1px solid #2a2a2a;
  color: var(--text-bright);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 7px 9px;
  outline: none;
  min-width: 0;
}
.field:focus { border-color: #444; }
.field::placeholder { color: #333; }

.field-sm { max-width: 80px; }

.add-btn {
  background: #161616;
  border: 1px solid #2a2a2a;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  padding: 7px 13px;
  cursor: pointer;
  line-height: 1;
}
.add-btn:active { background: #222; }

.hint {
  font-size: 10px;
  color: #383838;
  margin-top: 7px;
  line-height: 1.6;
}

.save-btn {
  width: 100%;
  background: none;
  border: 1px solid #333;
  color: var(--text-bright);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 11px;
  cursor: pointer;
  text-transform: uppercase;
  margin-top: 4px;
  transition: background 0.1s, border-color 0.1s;
}
.save-btn:active { background: #1a1a1a; border-color: #555; }

/* fade-in animation */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.item { animation: fadeUp 0.2s ease both; }

<body>

<header>
  <span class="logo">feed<span>.</span></span>
  <div class="header-actions">
    <button class="icon-btn" onclick="loadFeed()" title="Refresh">↻</button>
    <button class="icon-btn" onclick="openDrawer()" title="Settings">⚙</button>
  </div>
</header>

<div class="tabs">
  <button class="tab yt-active" id="tab-yt"  onclick="switchTab('yt')">▶ youtube</button>
  <button class="tab"           id="tab-red" onclick="switchTab('reddit')">● reddit</button>
</div>

<div id="feed"><div class="status">loading…</div></div>

<!-- Settings -->

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-title">configure feed</div>

  <div class="section">
    <div class="section-label">▶ YouTube channels</div>
    <div class="tags" id="yt-tags"></div>
    <div class="add-row">
      <input class="field" id="yt-id"   placeholder="channel ID" />
      <input class="field field-sm" id="yt-nm" placeholder="label" />
      <button class="add-btn" onclick="addYT()">+</button>
    </div>
    <p class="hint">
      To find a channel ID: open the channel on YouTube →<br>
      view page source → search for "channelId"
    </p>
  </div>

  <div class="section">
    <div class="section-label">● subreddits</div>
    <div class="tags" id="red-tags"></div>
    <div class="add-row">
      <input class="field" id="red-in" placeholder="subreddit name (no r/)" />
      <button class="add-btn" onclick="addSub()">+</button>
    </div>
  </div>

<button class="save-btn" onclick="saveAndClose()">save & reload</button>

</div>

<script>
/* ── Defaults ─────────────────────────────────────── */
const DEFAULTS = {
  yt: [
    { id: 'UCXuqSBlHAE6Xw-yeJA0Tunw', name: 'Linus Tech Tips' },
    { id: 'UCHnyfMqiRRG1u-2MsSQLbXA', name: 'Veritasium' },
    { id: 'UCsBjURrPoezykLs9EqgamOA', name: 'Fireship' },
  ],
  reddit: ['popular', 'worldnews', 'technology']
};

const PROXY = 'https://api.allorigins.win/get?url=';

/* ── State ────────────────────────────────────────── */
let cfg = loadCfg();
let tab = 'yt';
let tmp = null;

function loadCfg() {
  try { return JSON.parse(localStorage.getItem('feedcfg')) || clone(DEFAULTS); }
  catch { return clone(DEFAULTS); }
}
function saveCfg() { localStorage.setItem('feedcfg', JSON.stringify(cfg)); }
function clone(o) { return JSON.parse(JSON.stringify(o)); }

/* ── Tabs ─────────────────────────────────────────── */
function switchTab(t) {
  tab = t;
  document.getElementById('tab-yt').className  = 'tab' + (t === 'yt'     ? ' yt-active'  : '');
  document.getElementById('tab-red').className = 'tab' + (t === 'reddit' ? ' red-active' : '');
  loadFeed();
}

/* ── Feed loading ─────────────────────────────────── */
async function loadFeed() {
  const el = document.getElementById('feed');
  el.innerHTML = '<div class="status">loading…</div>';
  try {
    tab === 'yt' ? await loadYT() : await loadReddit();
  } catch(e) {
    el.innerHTML = `<div class="err">error: ${esc(e.message)}</div>`;
  }
}

async function loadYT() {
  const el = document.getElementById('feed');
  if (!cfg.yt.length) { el.innerHTML = '<div class="status">no channels — tap ⚙ to add</div>'; return; }

  const all = [];
  await Promise.allSettled(cfg.yt.map(async ch => {
    try {
      const feedUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${ch.id}`;
      const r = await fetch(PROXY + encodeURIComponent(feedUrl));
      const d = await r.json();
      const xml = new DOMParser().parseFromString(d.contents, 'application/xml');
      Array.from(xml.querySelectorAll('entry')).slice(0, 6).forEach(e => {
        const vidId = e.getElementsByTagNameNS('http://www.youtube.com/xml/schemas/2015','videoId')[0]?.textContent;
        const link  = e.querySelector('link')?.getAttribute('href') || (vidId ? `https://www.youtube.com/watch?v=${vidId}` : '');
        const thumb = e.getElementsByTagNameNS('http://search.yahoo.com/mrss/','thumbnail')[0]?.getAttribute('url')
                   || (vidId ? `https://i.ytimg.com/vi/${vidId}/mqdefault.jpg` : '');
        const pub   = e.querySelector('published')?.textContent;
        all.push({
          title: e.querySelector('title')?.textContent || '',
          url:   link,
          thumb,
          src:   ch.name || ch.id,
          date:  pub ? new Date(pub) : null
        });
      });
    } catch {}
  }));

  all.sort((a,b) => (b.date||0) - (a.date||0));

  if (!all.length) { el.innerHTML = '<div class="status">nothing loaded — check channel IDs</div>'; return; }

  el.innerHTML = all.map((v,i) => `
    <a class="item" href="${esc(v.url)}" target="_blank" rel="noopener" style="animation-delay:${i*25}ms">
      ${v.thumb
        ? `<img class="thumb" src="${esc(v.thumb)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'thumb-ph\\'>▶</div>'">`
        : `<div class="thumb-ph">▶</div>`}
      <div class="item-body">
        <div class="item-title">${esc(v.title)}</div>
        <div class="item-meta">
          <span class="meta-src-yt">${esc(v.src)}</span>
          ${v.date ? `<span>${ago(v.date)}</span>` : ''}
        </div>
      </div>
    </a>`).join('');
}

async function loadReddit() {
  const el = document.getElementById('feed');
  if (!cfg.reddit.length) { el.innerHTML = '<div class="status">no subreddits — tap ⚙ to add</div>'; return; }

  const all = [];
  await Promise.allSettled(cfg.reddit.map(async sub => {
    try {
      const r = await fetch(`https://www.reddit.com/r/${sub}.json?limit=20&raw_json=1`);
      const d = await r.json();
      d.data.children.forEach(p => {
        const x = p.data;
        if (x.stickied) return;
        all.push({
          title:    x.title,
          url:      `https://www.reddit.com${x.permalink}`,
          thumb:    x.thumbnail?.startsWith('http') ? x.thumbnail : null,
          src:      x.subreddit_name_prefixed,
          score:    x.score,
          comments: x.num_comments,
          date:     new Date(x.created_utc * 1000)
        });
      });
    } catch {}
  }));

  all.sort((a,b) => b.score - a.score);

  if (!all.length) { el.innerHTML = '<div class="status">nothing loaded</div>'; return; }

  el.innerHTML = all.map((p,i) => `
    <a class="item" href="${esc(p.url)}" target="_blank" rel="noopener" style="animation-delay:${i*20}ms">
      ${p.thumb
        ? `<img class="thumb" src="${esc(p.thumb)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'thumb-ph\\'>●</div>'">`
        : `<div class="thumb-ph" style="color:#d4430f">●</div>`}
      <div class="item-body">
        <div class="item-title">${esc(p.title)}</div>
        <div class="item-meta">
          <span class="meta-src-red">${esc(p.src)}</span>
          <span>↑${fmt(p.score)}</span>
          <span>${fmt(p.comments)} comments</span>
        </div>
      </div>
    </a>`).join('');
}

/* ── Settings drawer ──────────────────────────────── */
function openDrawer() {
  tmp = clone(cfg);
  renderTags();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}
function saveAndClose() { cfg = clone(tmp); saveCfg(); closeDrawer(); loadFeed(); }

function renderTags() {
  document.getElementById('yt-tags').innerHTML  = tmp.yt.map((c,i) =>
    `<div class="tag"><span>${esc(c.name||c.id)}</span><button class="tag-x" onclick="rmYT(${i})">×</button></div>`
  ).join('');
  document.getElementById('red-tags').innerHTML = tmp.reddit.map((s,i) =>
    `<div class="tag"><span>r/${esc(s)}</span><button class="tag-x" onclick="rmSub(${i})">×</button></div>`
  ).join('');
}

function addYT() {
  const id = document.getElementById('yt-id').value.trim();
  const nm = document.getElementById('yt-nm').value.trim();
  if (!id) return;
  tmp.yt.push({ id, name: nm||id });
  document.getElementById('yt-id').value = '';
  document.getElementById('yt-nm').value = '';
  renderTags();
}
function rmYT(i) { tmp.yt.splice(i,1); renderTags(); }

function addSub() {
  const s = document.getElementById('red-in').value.trim().replace(/^r\//,'');
  if (!s || tmp.reddit.includes(s)) return;
  tmp.reddit.push(s);
  document.getElementById('red-in').value = '';
  renderTags();
}
function rmSub(i) { tmp.reddit.splice(i,1); renderTags(); }

/* ── Helpers ──────────────────────────────────────── */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function ago(d) {
  const s = (Date.now()-d)/1000;
  if (s<3600)  return Math.floor(s/60)+'m';
  if (s<86400) return Math.floor(s/3600)+'h';
  return Math.floor(s/86400)+'d';
}
function fmt(n) { return n>=1000 ? (n/1000).toFixed(1)+'k' : String(n); }

/* ── Enter key support in inputs ─────────────────── */
document.getElementById('yt-nm').addEventListener('keydown',  e=>{ if(e.key==='Enter') addYT(); });
document.getElementById('yt-id').addEventListener('keydown',  e=>{ if(e.key==='Enter') addYT(); });
document.getElementById('red-in').addEventListener('keydown', e=>{ if(e.key==='Enter') addSub(); });

/* ── Init ─────────────────────────────────────────── */
loadFeed();
</script>

</body>
</html>
